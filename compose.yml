services:
  mysql:
    image: mysql:8.4.10
    container_name: saju-mysql
    restart: unless-stopped

    ports:
      - "3306:3306"

    environment:
      MYSQL_DATABASE: saju
      MYSQL_USER: saju
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: UTC

    command:
      - --character-set-server=utf8mb4
      - --default-time-zone=+00:00

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: